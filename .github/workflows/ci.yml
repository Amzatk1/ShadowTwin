name: CI

on:
  push:
    branches: ["main", "codex/**"]
  pull_request:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run typecheck:web
      - run: npm run typecheck:mobile

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install "django>=5.1" "djangorestframework>=3.15" "django-environ>=0.11" "django-cors-headers>=4.6" "psycopg[binary]>=3.2" "redis>=5.2" "celery>=5.4" "sentry-sdk>=2.19"
      - run: python -m compileall apps/api apps/worker
